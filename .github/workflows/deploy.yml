name: Deploy to GitHub Pages

# Manual-only: production deploys run on Cloudflare Pages (foldsteam.org).
# Kept as a fallback — run it from the Actions tab if ever needed.
on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Builds the Tina admin UI into public/admin so it ships with the site.
      # Skipped (with a warning) until TINA_CLIENT_ID / TINA_TOKEN secrets exist,
      # so the site still deploys before you've connected Tina Cloud.
      - name: Build Tina admin
        env:
          TINA_CLIENT_ID: ${{ secrets.TINA_CLIENT_ID }}
          TINA_TOKEN: ${{ secrets.TINA_TOKEN }}
          GITHUB_BRANCH: ${{ github.ref_name }}
        run: |
          if [ -n "$TINA_CLIENT_ID" ] && [ -n "$TINA_TOKEN" ]; then
            npx tinacms build
          else
            echo "::warning::TINA_CLIENT_ID / TINA_TOKEN not set — deploying site without the /admin editor."
          fi

      # Project pages live at /<repo>/; user pages (<user>.github.io) live at /.
      - name: Compute base path
        run: |
          repo="${GITHUB_REPOSITORY#*/}"
          if [[ "$repo" == *.github.io ]]; then
            echo "GHP_BASE=/" >> "$GITHUB_ENV"
          else
            echo "GHP_BASE=/$repo/" >> "$GITHUB_ENV"
          fi

      - name: Build site
        run: npm run build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
